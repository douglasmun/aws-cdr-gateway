  <rect x="308" y="84" width="278" height="72" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <!-- Icon area -->
  <rect x="308" y="84" width="48" height="72" rx="10" fill="#0ea5e9" opacity="0.15"/>
  <!-- S3 bucket icon -->
  <ellipse cx="332" cy="108" rx="12" ry="5" fill="none" stroke="#0ea5e9" stroke-width="1.8"/>
  <rect x="320" y="108" width="24" height="18" fill="none" stroke="#0ea5e9" stroke-width="1.8"/>
  <ellipse cx="332" cy="126" rx="12" ry="5" fill="none" stroke="#0ea5e9" stroke-width="1.8"/>
  <!-- Text -->
  <text x="366" y="107" font-size="13" font-weight="700" fill="#e2e8f0">S3 Source Bucket</text>
  <text x="366" y="124" font-size="10" fill="#94a3b8">upload-bucket / * (all prefixes)</text>
  <text x="366" y="142" font-size="10" fill="#64748b">ObjectCreated: PutObject · CompleteMultipartUpload (Copy excluded)</text>

  <!-- ── FLOW LABEL: EventBridge notification ── -->
  <line x1="447" y1="156" x2="447" y2="194" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="447,197 442,186 452,186" fill="#0ea5e9"/>
  <rect x="354" y="163" width="187" height="18" rx="4" fill="#0f172a"/>
  <text x="448" y="175" text-anchor="middle" font-size="10" fill="#0ea5e9">① EventBridge notification enabled on bucket</text>

  <!-- ══════════════════════════════════════════════════════════════════════════
       ROW 2 — Amazon EventBridge
  ══════════════════════════════════════════════════════════════════════════ -->

  <rect x="312" y="198" width="278" height="72" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="312" y="198" width="48" height="72" rx="10" fill="#a855f7" opacity="0.15"/>
  <!-- EventBridge icon (simplified bus) -->
  <rect x="320" y="216" width="22" height="14" rx="3" fill="none" stroke="#a855f7" stroke-width="1.8"/>
  <line x1="331" y1="230" x2="331" y2="240" stroke="#a855f7" stroke-width="1.8"/>
  <circle cx="331" cy="243" r="3" fill="#a855f7"/>
  <text x="370" y="221" font-size="13" font-weight="700" fill="#e2e8f0">Amazon EventBridge</text>
  <text x="370" y="236" font-size="10" fill="#94a3b8">Rule: source = aws.s3</text>
  <text x="370" y="250" font-size="10" fill="#64748b">detail-type = "Object Created"</text>
  <text x="370" y="264" font-size="9" fill="#64748b">reason: PutObject · CompleteMultipartUpload</text>

  <!-- ── Fan-out arrows ── -->
  <!-- Left arrow to CDR -->
  <line x1="360" y1="270" x2="210" y2="334" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="208,337 204,324 216,327" fill="#14b8a6"/>
  <!-- Right arrow to Malware -->
