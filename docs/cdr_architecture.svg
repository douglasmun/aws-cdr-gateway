  <text x="106" y="360" font-size="12" font-weight="700" fill="#e2e8f0">CDR Lambda</text>
  <text x="88" y="380" font-size="10" fill="#94a3b8">Strip active / executable content</text>

  <!-- Sub-items -->
  <!-- Office -->
  <rect x="80" y="390" width="126" height="36" rx="6" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <text x="143" y="404" text-anchor="middle" font-size="9" font-weight="700" fill="#60a5fa">OFFICE (docx xlsx pptx)</text>
  <text x="143" y="416" text-anchor="middle" font-size="8.5" fill="#64748b">macros · OLE · ext links</text>
  <text x="143" y="427" text-anchor="middle" font-size="8" fill="#334155">zipfile + ElementTree</text>

  <!-- PDF -->
  <rect x="214" y="390" width="126" height="36" rx="6" fill="#0f172a" stroke="#7c3aed" stroke-width="1"/>
  <text x="277" y="404" text-anchor="middle" font-size="9" font-weight="700" fill="#a78bfa">PDF</text>
  <text x="277" y="416" text-anchor="middle" font-size="8.5" fill="#64748b">JS · OpenAction · Launch</text>
  <text x="277" y="427" text-anchor="middle" font-size="8" fill="#334155">pikepdf</text>

