<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1020" width="900" height="1020" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="1020" fill="#0f1117" rx="12"/>

  <!-- ── TITLE ─────────────────────────────────────────────────────────────── -->
  <text x="450" y="42" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e8f0" letter-spacing="0.5">CDR Lambda — Content Disarmament &amp; Reconstruction</text>
  <text x="450" y="62" text-anchor="middle" font-size="11" fill="#64748b">EventBridge fan-out · S3 ObjectCreated trigger</text>

  <!-- ══════════════════════════════════════════════════════════════════════════
       ROW 1 — Source Bucket
  ══════════════════════════════════════════════════════════════════════════ -->

  <!-- Shadow -->
  <rect x="312" y="88" width="278" height="72" rx="10" fill="#1e293b" opacity="0.6"/>
