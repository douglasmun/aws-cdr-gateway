  <rect x="248" y="284" width="96" height="18" rx="4" fill="#0f172a"/>
  <text x="296" y="296" text-anchor="middle" font-size="10" fill="#14b8a6">② async invoke</text>
  <!-- Flow label right -->
  <rect x="556" y="284" width="96" height="18" rx="4" fill="#0f172a"/>
  <text x="604" y="296" text-anchor="middle" font-size="10" fill="#f59e0b">② async invoke</text>

