  <text x="688" y="876" text-anchor="middle" font-size="9" font-weight="600" fill="#94a3b8">SNS Result Topic</text>
  <text x="688" y="887" text-anchor="middle" font-size="8.5" fill="#64748b">CDR report · malware alert · error events</text>

