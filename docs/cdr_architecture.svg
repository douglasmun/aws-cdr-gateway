  <text x="620" y="426" text-anchor="middle" font-size="8" fill="#334155">cold start ~4 s</text>

  <rect x="690" y="390" width="128" height="36" rx="6" fill="#0f172a" stroke="#b45309" stroke-width="1"/>
  <text x="754" y="403" text-anchor="middle" font-size="9" font-weight="700" fill="#fbbf24">GuardDuty</text>
