  <text x="754" y="426" text-anchor="middle" font-size="8" fill="#334155">tag: MalwareScanStatus</text>

  <rect x="560" y="432" width="258" height="34" rx="6" fill="#0f172a" stroke="#b45309" stroke-width="1"/>
  <text x="689" y="446" text-anchor="middle" font-size="9" font-weight="700" fill="#fbbf24">External API (VirusTotal / Opswat)</text>
