       ROW 3 — Two Lambda functions (parallel)
  ══════════════════════════════════════════════════════════════════════════ -->

  <!-- ── LEFT: CDR Lambda ── -->
  <rect x="68" y="338" width="282" height="140" rx="10" fill="#1e293b" stroke="#14b8a6" stroke-width="1.5"/>
  <rect x="68" y="338" width="282" height="32" rx="10" fill="#14b8a6" opacity="0.18"/>
