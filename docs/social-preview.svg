<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <!-- background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111c2e"/>
    </linearGradient>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- subtle top accent bar -->
  <rect x="0" y="0" width="1280" height="6" fill="#22c55e"/>

  <!-- title block -->
  <text x="80" y="150" font-size="68" font-weight="800" fill="#f1f5f9">aws-cdr-gateway</text>
  <text x="80" y="206" font-size="30" font-weight="600" fill="#94a3b8">Content Disarmament &amp; Reconstruction for S3 uploads</text>
  <text x="80" y="250" font-size="22" fill="#64748b">Serverless · fail-closed · strips active/executable content before it reaches you</text>

  <!-- mini flow diagram -->
  <g transform="translate(80,320)">
    <!-- upload -->
    <rect x="0" y="0" width="210" height="92" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="105" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e2e8f0">S3 Upload</text>
    <text x="105" y="68" text-anchor="middle" font-size="15" fill="#94a3b8">docx · pdf · xlsx · img</text>

    <line x1="210" y1="46" x2="262" y2="46" stroke="#64748b" stroke-width="3" marker-end="url(#ar)"/>

    <!-- CDR lambda -->
    <rect x="262" y="0" width="250" height="92" rx="12" fill="#0f2a1c" stroke="#22c55e" stroke-width="2.5"/>
    <text x="387" y="40" text-anchor="middle" font-size="22" font-weight="800" fill="#4ade80">CDR Lambda</text>
    <text x="387" y="66" text-anchor="middle" font-size="14" fill="#94a3b8">macros · JS · OLE · EXIF stripped</text>

    <!-- two outputs -->
    <line x1="512" y1="34" x2="566" y2="20" stroke="#22c55e" stroke-width="3" marker-end="url(#ar)"/>
    <line x1="512" y1="60" x2="566" y2="74" stroke="#ef4444" stroke-width="3" marker-end="url(#ar)"/>

    <rect x="568" y="-14" width="230" height="50" rx="10" fill="#0f2a1c" stroke="#22c55e" stroke-width="1.5"/>
    <text x="683" y="17" text-anchor="middle" font-size="18" font-weight="700" fill="#4ade80">Sanitised</text>

    <rect x="568" y="56" width="230" height="50" rx="10" fill="#2a1414" stroke="#ef4444" stroke-width="1.5"/>
    <text x="683" y="87" text-anchor="middle" font-size="18" font-weight="700" fill="#f87171">Quarantine</text>
  </g>

  <!-- feature chips -->
  <g transform="translate(80,500)" font-size="17" font-weight="600">
    <rect x="0"   y="0" width="200" height="40" rx="20" fill="#1e293b" stroke="#334155"/>
    <text x="100" y="26" text-anchor="middle" fill="#cbd5e1">Zip-bomb safe</text>
    <rect x="216" y="0" width="190" height="40" rx="20" fill="#1e293b" stroke="#334155"/>
    <text x="311" y="26" text-anchor="middle" fill="#cbd5e1">ReDoS-hardened</text>
    <rect x="422" y="0" width="240" height="40" rx="20" fill="#1e293b" stroke="#334155"/>
    <text x="542" y="26" text-anchor="middle" fill="#cbd5e1">SAM + OpenTofu IaC</text>
    <rect x="678" y="0" width="170" height="40" rx="20" fill="#1e293b" stroke="#334155"/>
    <text x="763" y="26" text-anchor="middle" fill="#cbd5e1">154 tests</text>
  </g>

  <!-- right-side AWS/python footer -->
  <text x="1200" y="600" text-anchor="end" font-size="18" fill="#475569">AWS Lambda · EventBridge · Python 3.12 · MIT</text>
</svg>
