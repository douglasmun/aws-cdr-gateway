name: docker-publish

# Build and push the local CDR service image to GitHub Container Registry (GHCR).
#
# Triggers:
#   * a version tag push (v1.2.3)  → publishes :1.2.3, :1.2, :1, :latest
#   * manual run (workflow_dispatch) → publishes :<short-sha> (and :latest only from main)
#
# The image lands at ghcr.io/<owner>/aws-cdr-gateway. Pull with:
#   docker pull ghcr.io/douglasmun/aws-cdr-gateway:latest
#
# Publishing is deliberately NOT on every push — that would pollute the registry. Cut a
# release by pushing a tag:  git tag v1.0.0 && git push origin v1.0.0

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# GITHUB_TOKEN needs packages:write to push to GHCR; contents:read to checkout.
permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@1dc73863535b631f98b2378be8619f83b136f4a0 # v6.17.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
