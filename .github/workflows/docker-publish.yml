name: docker-publish

# Build and push the local CDR service image to GitHub Container Registry (GHCR).
#
# Triggers:
#   * a version tag push (v1.2.3)  → publishes :1.2.3, :1.2, :1, :latest
#   * manual run (workflow_dispatch) → publishes :<short-sha> (and :latest only from main)
#
# The image lands at ghcr.io/<owner>/aws-cdr-gateway. Pull with:
#   docker pull ghcr.io/douglasmun/aws-cdr-gateway:latest
#
# Publishing is deliberately NOT on every push — that would pollute the registry. Cut a
# release by pushing a tag:  git tag v1.0.0 && git push origin v1.0.0

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# GITHUB_TOKEN needs packages:write to push to GHCR; contents:read to checkout.
permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
